# NayeLa Paris - VirtualHost Apache
# À copier dans : /etc/apache2/sites-available/nayela-paris.conf
# Puis activer avec : sudo a2ensite nayela-paris.conf

<VirtualHost *:80>
    ServerName nayela.local
    ServerAlias www.nayela.local

    DocumentRoot /var/www/nayela-paris/public

    <Directory /var/www/nayela-paris/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Important pour Laravel
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>

    # Sécurité — bloquer accès aux dossiers sensibles
    <DirectoryMatch "^/var/www/nayela-paris/(storage|bootstrap/cache|vendor|config|app|database|routes)">
        Require all denied
    </DirectoryMatch>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/nayela-error.log
    CustomLog ${APACHE_LOG_DIR}/nayela-access.log combined

    # PHP timeout pour les opérations longues (Stripe)
    php_value max_execution_time 60
    php_value memory_limit 256M
</VirtualHost>

